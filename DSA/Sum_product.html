<body>
    <script>

        <!--

            let num = 153;
            function sumofDigit(num){
                let sum = 0;
                let temp =num;

                while(num>0){
                    let rem=num%10;
                  //  sum=rem+sum;
                  sum+=rem;
                    num=Math.floor(num/10);

                }
                console.log("Sum of digit",temp,"is ",sum);
            }
            
          
            function productofDigit(num){
                let product = 1;
                let temp =num;

                while(num>0){
                    let rem=num%10;
                  //  sum=rem+sum;
                  product*=rem;
                    num=Math.floor(num/10);

                }
                console.log("product  of digit",temp,"is ",product);
            }
            sumofDigit(num);
            setTimeout(productofDigit(),
        5000
        );



    </script>
