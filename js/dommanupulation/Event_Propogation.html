<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Propogation</title>
    <style>
         #parent{
            width: 300px;
            height: 300px;
            background-color: aqua;
         }
         #child{
              width: 200px;
            height: 200px;
            background-color: plum;
         }
    </style>

</head>
<body>
    <div id="parent">
        <div id="child">
            <button id ="btn">Clicks</button>
        </div>
    </div>
    

    <script>

    // let parent = 
    // document.getElementById('parent');
    // let child =
    // document.getElementByid('child');
    // let grandchild =
    // document.getElementByid('btn');


        let parent = document.getElementById('parent');
    // Change "Byid" to "ById"
    let child = document.getElementById('child');
    // Change "Byid" to "ById"
    let grandchild = document.getElementById('btn');
//========================Event bubbling =======================
    // parent.addEventListener("click",()=>{
    //     console.log('parentchild is clicked');
        
    // })
    //    child.addEventListener("click",()=>{
    //     console.log('child is clicked');
        
    // })

       grandchild.addEventListener("click",(event)=>{
        event.stopPropagation();

        console.log('grand child is clicked');
        
    },true)
        parent.addEventListener("click",()=>{
        console.log('parentchild is clicked');
        
    },true)
       child.addEventListener("click",()=>{
        console.log('child is clicked');
        
    },true)





    </script>
</body>
</html>
