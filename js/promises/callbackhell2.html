<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callbackhell</title>
</head>
<body>
    <script>

        //prepare lemon water
            //glass of water
            //squeeze lemon into water
            //adding sugar ,salt,etc..
            //stir and drink

            function step1(callback){
                setTimeout(()=>{
                      console.log('glass of water');
                      callback();
                },5000);
              

            }

            function step2(callback){
                setTimeout(() => {
                    console.log('squeeze lemon into water ');
                      callback();
                }, 3000);
                
            }

            function step3(callback){
                setTimeout(() => {
                     console.log('adding sugar ,salt,etc..');
                       callback();
                }, 3000);
               
            }
            function step4(callback){
                setTimeout(()=>{
                    console.log('stir and drink');
                      callback();
                },6000);
            }
// calling a function throug caller 
        //expected step 1 and 2 ,3,4...synchronus 
       // reason why we are not getting in order 
      //because we are dealing with time it changes the output ---asynchronus code
      // 
    //    to avoid that  we can prefer call back hell



//call back hell :calling function into another function using arrow function
// problem:issues lengthy code 
// make code diffcult to read
            step1(()=>{
                step2(()=>{
                    step3(()=>{
                        step4();
                    })
                });
            });

            
           
    </script>
    
</body>
</html>
